name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Public URL of your LLM proxy (the Cloudflare Worker that holds the
          # HF token). NOT a secret — the key lives only in the Worker. Set it
          # under Repo → Settings → Secrets and variables → Actions → Variables.
          # If unset, the site ships with the key-free built-in engine.
          VITE_AGENT_PROXY_URL: ${{ vars.VITE_AGENT_PROXY_URL }}
          # Optional: override the HF chat model (defaults to Llama-3.1-8B-Instruct).
          VITE_HF_MODEL: ${{ vars.VITE_HF_MODEL }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
